<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NGX Intel | AI Stock Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  </head>
  <body style="background-color: #0c0a09; margin: 0; padding: 0;">
    <div id="root">
      <!-- Preload Loader -->
      <div id="initial-loader" style="height: 100vh; width: 100vw; display: flex; flex-direction: column; items-center: center; justify-content: center; font-family: 'Inter', sans-serif; gap: 24px; color: white;">
        <style>
          @keyframes pulse-ring {
            0% { transform: scale(.33); }
            80%, 100% { opacity: 0; }
          }
          @keyframes pulse-dot {
            0% { transform: scale(.8); }
            50% { transform: scale(1); }
            100% { transform: scale(.8); }
          }
          .loader-container {
            position: relative;
            width: 48px;
            height: 48px;
          }
          .loader-ring {
            position: absolute;
            top: 0; left: 0;
            width: 48px;
            height: 48px;
            background-color: #22c55e;
            border-radius: 50%;
            animation: pulse-ring 1.25s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
          }
          .loader-dot {
            position: absolute;
            top: 12px; left: 12px;
            width: 24px;
            height: 24px;
            background-color: #22c55e;
            border-radius: 50%;
            animation: pulse-dot 1.25s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
          }
          .loader-text {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: #78716c;
            animation: opacity-pulse 2s ease-in-out infinite;
            text-align: center;
          }
          @keyframes opacity-pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
          }
        </style>
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px;">
          <div class="loader-container">
            <div class="loader-ring"></div>
            <div class="loader-dot"></div>
          </div>
          <div class="loader-text">NGX Intelligence System<br/><span style="font-weight: 400; font-size: 8px; margin-top: 8px; display: block; opacity: 0.7;">Initializing Neural Network</span></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
